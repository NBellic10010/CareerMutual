name: onlyboth-dev

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${ONLYBOTH_POSTGRES_DB:-onlyboth}
      POSTGRES_USER: ${ONLYBOTH_POSTGRES_USER:-onlyboth}
      POSTGRES_PASSWORD: ${ONLYBOTH_POSTGRES_PASSWORD:-local-development-only}
    ports:
      - "127.0.0.1:${ONLYBOTH_POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 2s
      timeout: 3s
      retries: 20
      start_period: 5s
    volumes:
      - onlyboth-postgres-data:/var/lib/postgresql/data
    security_opt:
      - no-new-privileges:true

  minio:
    image: quay.io/minio/minio:RELEASE.2025-04-22T22-12-26Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${ONLYBOTH_MINIO_USER:-onlyboth-local}
      MINIO_ROOT_PASSWORD: ${ONLYBOTH_MINIO_PASSWORD:-onlyboth-local-development-secret}
      MINIO_API_CORS_ALLOW_ORIGIN: "http://127.0.0.1:3000,http://localhost:3000,http://127.0.0.1:3100,http://localhost:3100"
    ports:
      - "127.0.0.1:${ONLYBOTH_MINIO_API_PORT:-9000}:9000"
      - "127.0.0.1:${ONLYBOTH_MINIO_CONSOLE_PORT:-9001}:9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 2s
      timeout: 3s
      retries: 30
      start_period: 5s
    volumes:
      - onlyboth-minio-data:/data
    security_opt:
      - no-new-privileges:true

volumes:
  onlyboth-postgres-data:
  onlyboth-minio-data:
